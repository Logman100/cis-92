apiVersion: v1
kind: Pod
metadata:
  name: mysite
  labels:
    function: app
spec:
  containers:
    - name: mysite
      image: ghcr.io/logman100/cis-92:milestone-5.0
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: 1000m
          memory: 1024Mi
          ephemeral-storage: 10Mi
        limits:
          cpu: 1000m
          memory: 1024Mi
          ephemeral-storage: 10Mi
      envFrom:
        - configMapRef:
            name: mysite-config
        - secretRef:
            name: mysite-secret
      volumeMounts:
        - name: db
          mountPath: /data
  volumes:
    - name: db
      persistentVolumeClaim:
        claimName: mysite-data
  securityContext:
    fsGroup: 1000