apiVersion: v1
kind: Pod
metadata:
  name: mysite
  labels:
    function: app
spec:
  containers:
    - name: mysite
      image: gcr.io/cis-92-489201/myapp:latest
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
          ephemeral-storage: 10Mi
        limits:
          cpu: 250m
          memory: 512Mi
          ephemeral-storage: 10Mi
      envFrom:
        - configMapRef:
            name: mysite-config
        - secretRef:
            name: mysite-secret